<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathAI | Darslar va formulalar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Search */
        .search-box {
            background: white;
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box i {
            color: #667eea;
            font-size: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }

        /* Topics Grid */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .topic-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .topic-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .topic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .topic-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .difficulty {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .difficulty-1 { background: #4CAF50; color: white; }
        .difficulty-2 { background: #8BC34A; color: white; }
        .difficulty-3 { background: #CDDC39; color: #333; }
        .difficulty-4 { background: #FFC107; color: #333; }
        .difficulty-5 { background: #FF9800; color: white; }
        .difficulty-6 { background: #FF5722; color: white; }
        .difficulty-7 { background: #f44336; color: white; }
        .difficulty-8 { background: #9C27B0; color: white; }
        .difficulty-9 { background: #673AB7; color: white; }
        .difficulty-10 { background: #3F51B5; color: white; }

        .topic-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .topic-preview {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .mastery-level {
            display: inline-block;
            background: #e8f5e9;
            color: #4CAF50;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .modal-header h2 {
            color: #667eea;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .formula-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 16px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
        }

        .example-box {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            border-left: 4px solid #4CAF50;
        }

        .practice-box {
            background: #fff3e0;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            border-left: 4px solid #FF9800;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .topics-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-book"></i> MathAI Darslar</h1>
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Bosh sahifa</a>
        </div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Mavzu nomi yoki formula bo'yicha qidirish...">
        </div>

        <div class="topics-grid" id="topicsGrid"></div>
    </div>

    <!-- Modal -->
    <div id="lessonModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // 20 TA MAVZU MA'LUMOTLARI
        const TOPICS = [
            { 
                name: "Butun sonlar", 
                difficulty: 1, 
                formula: "a + b = c, a - b = c, a × b = c, a ÷ b = c",
                explanation: "Butun sonlar - manfiy, nol va musbat sonlarni o'z ichiga oladi. Ular ustida qo'shish, ayirish, ko'paytirish va bo'lish amallari bajariladi.",
                example: "25 + 17 = 42, 100 - 35 = 65, 12 × 8 = 96, 144 ÷ 12 = 12",
                practice: "1) 345 + 278 = ?\n2) 1000 - 647 = ?\n3) 25 × 16 = ?\n4) 625 ÷ 25 = ?"
            },
            { 
                name: "Kasrlar", 
                difficulty: 2, 
                formula: "a/b + c/d = (ad + bc)/bd, a/b × c/d = ac/bd",
                explanation: "Kasr - sonning bo'linma ko'rinishi. Surat va maxrajdan tashkil topadi. Kasrlarni qo'shish, ayirish, ko'paytirish va bo'lish amallari mavjud.",
                example: "1/2 + 1/3 = 5/6, 2/3 × 3/4 = 6/12 = 1/2",
                practice: "1) 3/4 + 2/5 = ?\n2) 7/8 - 1/4 = ?\n3) 2/3 × 3/5 = ?\n4) 4/5 ÷ 2/3 = ?"
            },
            { 
                name: "Foizlar", 
                difficulty: 2, 
                formula: "P% = P/100, P% of X = (P/100) × X",
                explanation: "Foiz - yuzdan bir qism. Foizlarni hisoblashda asosiy formula: (qism/butun) × 100%",
                example: "20% of 150 = (20/100) × 150 = 30",
                practice: "1) 30% of 200 = ?\n2) 15% of 80 = ?\n3) 45 dan 9 necha foiz?\n4) 250 ning 25% i?"
            },
            { 
                name: "Daraja", 
                difficulty: 3, 
                formula: "aⁿ = a × a × ... × a (n marta)",
                explanation: "Daraja - sonning o'ziga necha marta ko'paytirilishi. a - asos, n - daraja ko'rsatkichi.",
                example: "2³ = 2 × 2 × 2 = 8, 5² = 25, 10⁴ = 10000",
                practice: "1) 3⁴ = ?\n2) 4³ = ?\n3) 2⁵ = ?\n4) 6² = ?"
            },
            { 
                name: "Ildiz", 
                difficulty: 3, 
                formula: "√a = b, agar b² = a",
                explanation: "Kvadrat ildiz - o'ziga ko'paytirilganda a ni beradigan son. Ildiz darajaning teskari amali.",
                example: "√64 = 8, √144 = 12, √225 = 15",
                practice: "1) √169 = ?\n2) √400 = ?\n3) √81 = ?\n4) √10000 = ?"
            },
            { 
                name: "Proportsiya", 
                difficulty: 3, 
                formula: "a/b = c/d → ad = bc",
                explanation: "Proportsiya - ikki nisbatning tengligi. a:b = c:d ko'rinishida yoziladi.",
                example: "x/5 = 10/25 → 25x = 50 → x = 2",
                practice: "1) x/8 = 5/20, x = ?\n2) 3/4 = 9/x, x = ?\n3) 7/x = 14/6, x = ?"
            },
            { 
                name: "Bir noma'lumli tenglama", 
                difficulty: 4, 
                formula: "ax + b = c → x = (c - b)/a",
                explanation: "Bir noma'lumli chiziqli tenglama - noma'lum birinchi darajada qatnashgan tenglama.",
                example: "3x + 5 = 20 → 3x = 15 → x = 5",
                practice: "1) 4x + 7 = 31\n2) 5x - 8 = 22\n3) 2x + 9 = 25"
            },
            { 
                name: "Ikki noma'lumli tenglama", 
                difficulty: 5, 
                formula: "Sistema: {a₁x + b₁y = c₁, a₂x + b₂y = c₂}",
                explanation: "Ikki noma'lumli tenglamalar sistemasi - ikki tenglamadan tashkil topgan sistema. Yechish usullari: almashtirish, qo'shish, Kramer.",
                example: "x + y = 10, x - y = 4 → x = 7, y = 3",
                practice: "1) x + y = 15, x - y = 5\n2) 2x + y = 10, x - y = 2"
            },
            { 
                name: "Kvadrat tenglama", 
                difficulty: 6, 
                formula: "ax² + bx + c = 0 → x = [-b ± √(b² - 4ac)]/2a",
                explanation: "Kvadrat tenglama - noma'lum ikkinchi darajada qatnashgan tenglama. Diskriminant D = b² - 4ac.",
                example: "x² - 5x + 6 = 0 → D = 25 - 24 = 1 → x = (5 ± 1)/2 → x = 3, 2",
                practice: "1) x² - 7x + 12 = 0\n2) x² - 4x - 5 = 0\n3) x² + 3x - 10 = 0"
            },
            { 
                name: "Kvadrat funksiya", 
                difficulty: 6, 
                formula: "y = ax² + bx + c, tepa nuqta: x = -b/(2a)",
                explanation: "Kvadrat funksiya - grafigi parabola bo'lgan funksiya. Parabolaning uchi (tepa nuqtasi) muhim.",
                example: "y = x² - 4x + 3 → tepa nuqta x = 2, y = -1",
                practice: "1) y = x² - 6x + 5 tepa nuqtasini toping\n2) y = -x² + 4x + 1 grafigini tasvirlang"
            },
            { 
                name: "Logarifm (asosiy)", 
                difficulty: 7, 
                formula: "log_a(b) = c → a^c = b",
                explanation: "Logarifm - darajaning teskari funksiyasi. a > 0, a ≠ 1, b > 0 bo'lishi shart.",
                example: "log₂(8) = 3, log₃(27) = 3, log₅(125) = 3",
                practice: "1) log₄(64) = ?\n2) log₃(81) = ?\n3) log₂(32) = ?"
            },
            { 
                name: "Logarifmik tenglama", 
                difficulty: 8, 
                formula: "log_a(x) = b → x = a^b",
                explanation: "Logarifmik tenglamalar - noma'lum logarifm ichida qatnashgan tenglamalar.",
                example: "log₂(x) = 3 → x = 2³ = 8",
                practice: "1) log₃(x) = 4\n2) log₅(x) = 2\n3) log₂(x - 1) = 3"
            },
            { 
                name: "Trigonometriya", 
                difficulty: 7, 
                formula: "sin²α + cos²α = 1, sin(α ± β) = sinα cosβ ± cosα sinβ",
                explanation: "Trigonometriya - uchburchak tomonlari va burchaklari orasidagi munosabatlarni o'rganadi.",
                example: "sin(30°) = 0.5, cos(60°) = 0.5, tan(45°) = 1",
                practice: "1) sin(45°) = ?\n2) cos(30°) = ?\n3) tan(60°) = ?"
            },
            { 
                name: "Trigonometrik tenglama", 
                difficulty: 8, 
                formula: "sin(x) = a → x = arcsin(a) + 2πk",
                explanation: "Trigonometrik tenglamalar - noma'lum trigonometrik funksiya ichida qatnashadi.",
                example: "sin(x) = 0.5 → x = 30° + 360°·k yoki x = 150° + 360°·k",
                practice: "1) cos(x) = 0.5\n2) sin(x) = √3/2\n3) tan(x) = 1"
            },
            { 
                name: "Arifmetik progressiya", 
                difficulty: 7, 
                formula: "a_n = a₁ + (n-1)d, S_n = n(a₁ + a_n)/2",
                explanation: "Arifmetik progressiya - har bir had o'zidan oldingi hadga doimiy son (d) qo'shish orqali hosil qilinadi.",
                example: "a₁=2, d=3 → a₅ = 2 + 4×3 = 14",
                practice: "1) a₁=5, d=4, a₁₀ = ?\n2) a₁=10, d=-2, a₆ = ?"
            },
            { 
                name: "Geometrik progressiya", 
                difficulty: 8, 
                formula: "a_n = a₁ × q^(n-1), S_n = a₁(qⁿ - 1)/(q - 1)",
                explanation: "Geometrik progressiya - har bir had o'zidan oldingi hadga doimiy son (q) ko'paytirish orqali hosil qilinadi.",
                example: "a₁=3, q=2 → a₄ = 3 × 2³ = 24",
                practice: "1) a₁=2, q=3, a₅ = ?\n2) a₁=5, q=1/2, a₄ = ?"
            },
            { 
                name: "Limit", 
                difficulty: 9, 
                formula: "lim(x→a) f(x) = L",
                explanation: "Limit - funksiyaning argument biror qiymatga intilgandagi qiymati.",
                example: "lim(x→2) (x² - 4)/(x - 2) = 4",
                practice: "1) lim(x→1) (x² - 1)/(x - 1)\n2) lim(x→0) sin(x)/x"
            },
            { 
                name: "Hosila", 
                difficulty: 9, 
                formula: "f'(x) = lim(h→0) [f(x+h) - f(x)]/h",
                explanation: "Hosila - funksiyaning o'zgarish tezligi. Hosila yordamida tangens, ekstremumlar topiladi.",
                example: "f(x) = x² → f'(x) = 2x",
                practice: "1) f(x) = x³ → f'(x) = ?\n2) f(x) = sin(x) → f'(x) = ?"
            },
            { 
                name: "Integral", 
                difficulty: 10, 
                formula: "∫ xⁿ dx = xⁿ⁺¹/(n+1) + C",
                explanation: "Integral - hosilaning teskari amali. Yuzani, hajmni hisoblashda ishlatiladi.",
                example: "∫ x² dx = x³/3 + C",
                practice: "1) ∫ x³ dx = ?\n2) ∫ 5 dx = ?"
            },
            { 
                name: "Aniq integral", 
                difficulty: 10, 
                formula: "∫_a^b f(x)dx = F(b) - F(a)",
                explanation: "Aniq integral - egri chiziq ostidagi yuzani hisoblaydi.",
                example: "∫₀¹ x² dx = 1/3",
                practice: "1) ∫₀² x dx = ?\n2) ∫₁² x² dx = ?"
            }
        ];

        let currentUser = null;

        // Load user data
        function loadUser() {
            const users = JSON.parse(localStorage.getItem("mathai_users")) || {};
            const lastUser = localStorage.getItem("mathai_last_user");
            if (lastUser) {
                const userData = JSON.parse(lastUser);
                currentUser = users[userData.fullName];
            }
        }

        // Get mastery level for topic
        function getMasteryLevel(topicName) {
            if (currentUser && currentUser.topicMastery && currentUser.topicMastery[topicName]) {
                const level = currentUser.topicMastery[topicName].level;
                return Math.round(level * 10);
            }
            return 0;
        }

        // Get difficulty class
        function getDifficultyClass(difficulty) {
            return `difficulty-${difficulty}`;
        }

        // Render topics
        function renderTopics(filter = "") {
            const grid = document.getElementById("topicsGrid");
            const filteredTopics = TOPICS.filter(topic => 
                topic.name.toLowerCase().includes(filter.toLowerCase()) ||
                topic.formula.toLowerCase().includes(filter.toLowerCase())
            );
            
            grid.innerHTML = filteredTopics.map(topic => {
                const mastery = getMasteryLevel(topic.name);
                return `
                    <div class="topic-card" onclick="openTopic('${topic.name}')">
                        <div class="topic-header">
                            <div class="topic-icon">
                                <i class="fas fa-chalkboard-user"></i>
                            </div>
                            <span class="difficulty ${getDifficultyClass(topic.difficulty)}">
                                ★ ${topic.difficulty}/10
                            </span>
                        </div>
                        <div class="topic-title">${topic.name}</div>
                        <div class="topic-preview">
                            ${topic.formula.substring(0, 60)}...
                        </div>
                        ${mastery > 0 ? `<div class="mastery-level">🎯 O'zlashtirish: ${mastery}%</div>` : ""}
                    </div>
                `;
            }).join('');
        }

        // Open topic modal
        function openTopic(topicName) {
            const topic = TOPICS.find(t => t.name === topicName);
            if (!topic) return;
            
            document.getElementById("modalTitle").innerHTML = `<i class="fas fa-book-open"></i> ${topic.name}`;
            
            document.getElementById("modalBody").innerHTML = `
                <div class="formula-box">
                    <strong>📐 Formula:</strong><br>
                    ${topic.formula}
                </div>
                
                <div class="example-box">
                    <strong>📝 Misol:</strong><br>
                    ${topic.example}
                </div>
                
                <div class="practice-box">
                    <strong>✏️ Amaliy topshiriq:</strong><br>
                    ${topic.practice.replace(/\n/g, '<br>')}
                </div>
                
                <div style="margin-top: 20px;">
                    <strong>📖 Batafsil tushuntirish:</strong><br>
                    <p style="margin-top: 10px; line-height: 1.6;">${topic.explanation}</p>
                </div>
                
                <div style="margin-top: 25px; display: flex; gap: 10px; justify-content: center;">
                    <button class="back-btn" onclick="closeModal()" style="background: #4CAF50;">Tushunildi</button>
                    <button class="back-btn" onclick="goToTest()" style="background: #2196F3;">Test topshirish</button>
                </div>
            `;
            
            document.getElementById("lessonModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("lessonModal").style.display = "none";
        }

        function goToTest() {
            window.location.href = "/";
        }

        // Search functionality
        document.getElementById("searchInput").addEventListener("input", (e) => {
            renderTopics(e.target.value);
        });

        // Close modal on outside click
        window.onclick = (e) => {
            const modal = document.getElementById("lessonModal");
            if (e.target === modal) closeModal();
        };

        // Initial render
        loadUser();
        renderTopics();

        console.log("📚 Darslar sahifasi yuklandi!");
    </script>
</body>
</html>
